<header class="site-header">
  <a class="brand" routerLink="/">Fernando G. Ferreyra</a>

  <nav class="site-nav" [attr.aria-label]="content().navigationAriaLabel">
    <a routerLink="/" [routerLinkActiveOptions]="{ exact: true }" routerLinkActive="active">
      {{ content().homeLabel }}
    </a>
    <a routerLink="/about" routerLinkActive="active">{{ content().aboutLabel }}</a>
    <a routerLink="/projects" routerLinkActive="active">{{ content().projectsLabel }}</a>
    <a routerLink="/skills" routerLinkActive="active">{{ content().skillsLabel }}</a>
    <a routerLink="/contact" routerLinkActive="active">{{ content().contactLabel }}</a>
  </nav>

  <div class="header-actions">
    <div class="header-controls">
      <div class="theme-switcher" role="group" [attr.aria-label]="themeSwitcherLabel()">
        <button
          type="button"
          *ngFor="let theme of themes()"
          [class.is-active]="activeTheme() === theme.id"
          [attr.aria-pressed]="activeTheme() === theme.id"
          [attr.aria-label]="theme.label"
          (click)="setTheme(theme.id)"
        >
          {{ theme.shortLabel }}
        </button>
      </div>

      <button
        type="button"
        class="language-toggle"
        [attr.aria-label]="content().languageToggleAriaLabel"
        [attr.aria-pressed]="currentLanguage() === 'en'"
        (click)="toggleLanguage()"
      >
        <span [class.is-active]="currentLanguage() === 'es'">ES</span>
        <span [class.is-active]="currentLanguage() === 'en'">EN</span>
      </button>
    </div>

    <nav class="site-social" [attr.aria-label]="content().socialAriaLabel">
      <a
        href="https://github.com/fernandogferreyra"
        target="_blank"
        rel="noopener"
      >
        GitHub
      </a>
      <a
        href="https://www.linkedin.com/in/fernando-ferreyra-40a126328"
        target="_blank"
        rel="noopener"
      >
        LinkedIn
      </a>
    </nav>
  </div>
</header>
