<section class="control-center">
  <div class="control-center__hero surface-card">
    <div class="control-center__hero-copy">
      <p class="section-eyebrow">{{ content().eyebrow }}</p>
      <h1 class="portfolio-page-title">{{ content().title }}</h1>
      <p class="control-center__lead">{{ content().lead }}</p>
    </div>

    <div class="control-center__session portfolio-subcard">
      <span class="control-center__session-label">{{ content().statusLabel }}</span>
      <strong>{{ authService.session()?.username || 'FERCHUZ' }}</strong>
      <span>{{ authService.session()?.role || 'ADMIN' }}</span>

      <button
        type="button"
        class="control-center__logout motion-control"
        (click)="logout()"
      >
        {{ content().logoutLabel }}
      </button>
    </div>
  </div>

  <div class="control-center__grid">
    <article
      class="control-center__card surface-card motion-panel"
      *ngFor="let module of content().modules"
    >
      <div class="control-center__card-top">
        <span class="control-center__tag">{{ module.tag }}</span>
        <span class="control-center__status">{{ module.status }}</span>
      </div>

      <h2 class="portfolio-card-title">{{ module.title }}</h2>
      <p>{{ module.description }}</p>

      <button
        type="button"
        class="control-center__action motion-control"
        disabled
      >
        {{ module.action }}
      </button>
    </article>
  </div>
</section>
