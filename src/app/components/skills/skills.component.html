<section class="skills-page">
  <section class="surface-card skills-hero" aria-labelledby="skills-title" appRevealOnScroll>
    <div class="skills-hero__copy">
      <p class="section-eyebrow">{{ ui().eyebrow }}</p>
      <h1 id="skills-title" class="skills-hero__title portfolio-page-title">{{ ui().title }}</h1>
      <p class="skills-hero__lead">{{ ui().intro }}</p>
    </div>

    <aside class="skills-focus-panel motion-panel portfolio-subcard" appRevealOnScroll="right" [revealDelay]="140">
      <p class="section-eyebrow">{{ ui().focusTitle }}</p>

      <div class="skills-focus-list">
        <div class="skills-focus-item" *ngFor="let area of focusAreas(); trackBy: trackByFocusId">
          <div class="skills-focus-item__header">
            <span>{{ area.label }}</span>
          </div>

          <span class="skills-focus-bar" aria-hidden="true">
            <span class="skills-focus-bar__fill" [style.width]="area.width"></span>
          </span>
        </div>
      </div>
    </aside>
  </section>

  <section class="surface-card skills-shell" appRevealOnScroll [revealDelay]="80">
    <div class="skills-lanes__heading">
      <h2 class="portfolio-section-title">{{ ui().lanesTitle }}</h2>
      <p>{{ ui().lanesDescription }}</p>
    </div>

    <section class="skills-lanes">
      <article
        class="skills-lane motion-swap"
        *ngFor="let lane of showcaseLanes(); trackBy: trackByLaneId; let laneIndex = index"
        [class.skills-lane--reverse]="lane.direction === 'right'"
        [style.--lane-duration]="lane.duration"
        appRevealOnScroll
        [revealDelay]="120 + laneIndex * 60"
        [revealDistance]="26"
      >
        <div class="skills-lane__header">
          <span class="skills-lane__label">{{ lane.label }}</span>
        </div>

        <div class="skills-lane__marquee">
          <div class="skills-lane__track">
            <div
              class="skills-lane__sequence"
              *ngFor="let copy of laneCopies"
              [attr.aria-hidden]="copy === 1 ? 'true' : null"
            >
              <article
                class="skill-card motion-panel portfolio-subcard"
                *ngFor="let skill of lane.skills; trackBy: trackBySkillId"
                [class.skill-card--no-level]="!skill.showLevel"
                [style.--skill-accent]="skill.icon.accent"
                [style.--skill-surface]="skill.icon.surface"
                [style.--skill-border]="skill.icon.border"
              >
                <div class="skill-card__top">
                  <span class="skill-card__icon" aria-hidden="true">
                    <svg
                      [attr.viewBox]="skill.icon.viewBox"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.8"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <path *ngFor="let path of skill.icon.paths" [attr.d]="path"></path>
                    </svg>
                  </span>

                  <span
                    *ngIf="skill.showLevel"
                    class="skill-level"
                    [class.skill-level--basic]="skill.level === 'basic'"
                    [class.skill-level--intermediate]="skill.level === 'intermediate'"
                    [class.skill-level--advanced]="skill.level === 'advanced'"
                    [attr.aria-label]="skill.levelLabel"
                  >
                    <span class="skill-level__bars" aria-hidden="true">
                      <span></span>
                      <span></span>
                      <span></span>
                    </span>
                    <span class="skill-level__label">{{ skill.levelLabel }}</span>
                  </span>
                </div>

                <div class="skill-card__copy">
                  <h3 class="portfolio-card-title">{{ skill.name }}</h3>
                  <p>{{ skill.description }}</p>
                </div>

                <div class="skill-card__tags" *ngIf="skill.tags.length">
                  <span class="skill-card__tag motion-chip" *ngFor="let tag of skill.tags">{{ tag }}</span>
                </div>
              </article>
            </div>
          </div>
        </div>
      </article>
    </section>
  </section>
</section>
