<header class="site-header">
  <a class="brand motion-control" routerLink="/" fragment="home-top">
    <span class="brand__avatar" aria-hidden="true">
      <span class="brand__avatar-frame">
        <img
          *ngIf="brandAvatarVisible()"
          [src]="brandAvatarUrl()"
          alt=""
          loading="eager"
          decoding="async"
          (error)="onBrandAvatarError()"
        />
        <span class="brand__avatar-fallback" *ngIf="!brandAvatarVisible()">FG</span>
      </span>
    </span>
    <span class="brand__label">Fernando G. Ferreyra</span>
  </a>

  <nav class="site-nav" [attr.aria-label]="content().navigationAriaLabel">
    <a
      class="site-nav__link motion-control"
      routerLink="/"
      fragment="home-top"
      [routerLinkActiveOptions]="{ exact: true }"
      routerLinkActive="active"
      [attr.aria-label]="homeShortcutLabel()"
      (click)="goToHome($event)"
    >
      {{ content().homeLabel }}
    </a>
    <a class="site-nav__link motion-control" routerLink="/projects" routerLinkActive="active">{{ content().projectsLabel }}</a>
    <a class="site-nav__link motion-control" routerLink="/skills" routerLinkActive="active">{{ content().skillsLabel }}</a>
    <a class="site-nav__link motion-control" routerLink="/credentials" routerLinkActive="active">{{ content().credentialsLabel }}</a>
    <a class="site-nav__link motion-control" routerLink="/contact" routerLinkActive="active">{{ content().contactLabel }}</a>
    <a
      *ngIf="authService.isAdmin()"
      class="site-nav__link site-nav__link--control motion-control"
      routerLink="/control-center"
      routerLinkActive="active"
    >
      {{ controlCenterLabel() }}
    </a>
  </nav>

  <div class="header-actions">
    <div class="header-controls">
      <button
        *ngIf="!authService.isAuthenticated()"
        type="button"
        class="theme-menu__trigger motion-control"
        [attr.aria-label]="privateAccessAriaLabel()"
        (click)="openLoginModal()"
      >
        <span aria-hidden="true">+</span>
        <span>{{ privateAccessLabel() }}</span>
      </button>

      <div
        *ngIf="authService.isAuthenticated()"
        class="header-admin-actions"
      >
        <span class="header-status" [class.is-online]="authService.isAuthenticated()" [class.is-offline]="!authService.isAuthenticated()">
          {{ onlineStatusLabel() }}
        </span>

        <button
          type="button"
          class="theme-menu__trigger motion-control"
          (click)="goToControlCenter()"
        >
          {{ controlCenterLabel() }}
        </button>

        <button
          type="button"
          class="edit-mode-toggle motion-control"
          [class.is-active]="editModeService.isEnabled()"
          [class.is-disabled-state]="!editModeService.isEnabled()"
          [attr.aria-pressed]="editModeService.isEnabled()"
          (click)="toggleEditMode()"
        >
          {{ editModeLabel() }}
        </button>

        <button
          type="button"
          class="theme-menu__trigger motion-control"
          (click)="logout()"
        >
          {{ logoutLabel() }}
        </button>
      </div>

      <div class="theme-menu" [class.is-open]="themeMenuOpen()">
        <button
          type="button"
          class="theme-menu__trigger motion-control"
          [attr.aria-expanded]="themeMenuOpen()"
          aria-haspopup="menu"
          [attr.aria-label]="themeSwitcherLabel()"
          (click)="toggleThemeMenu()"
        >
          <span class="theme-menu__palette" aria-hidden="true">
            <span class="theme-menu__swatch" [style.--swatch-color]="activeThemeOption().preview.surface"></span>
            <span class="theme-menu__swatch" [style.--swatch-color]="activeThemeOption().preview.accentSoft"></span>
            <span class="theme-menu__swatch" [style.--swatch-color]="activeThemeOption().preview.accent"></span>
          </span>
          <span class="theme-menu__label">{{ activeThemeOption().label }}</span>
          <svg class="theme-menu__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m7 10 5 5 5-5"></path>
          </svg>
        </button>

        <div
          class="theme-menu__panel surface-card"
          *ngIf="themeMenuOpen()"
          role="menu"
          [attr.aria-label]="themeMenuOptionsLabel()"
        >
          <button
            type="button"
            class="theme-menu__option motion-control"
            *ngFor="let theme of themes()"
            role="menuitemradio"
            [class.is-active]="activeTheme() === theme.id"
            [attr.aria-checked]="activeTheme() === theme.id"
            [attr.aria-label]="theme.label"
            (click)="selectTheme(theme.id)"
          >
            <span class="theme-menu__option-copy">
              <span class="theme-menu__option-name">{{ theme.label }}</span>
            </span>

            <span class="theme-menu__palette" aria-hidden="true">
              <span class="theme-menu__swatch" [style.--swatch-color]="theme.preview.surface"></span>
              <span class="theme-menu__swatch" [style.--swatch-color]="theme.preview.accentSoft"></span>
              <span class="theme-menu__swatch" [style.--swatch-color]="theme.preview.accent"></span>
            </span>
          </button>
        </div>
      </div>

      <button
        type="button"
        class="language-toggle motion-control"
        [attr.aria-label]="content().languageToggleAriaLabel"
        [attr.aria-pressed]="currentLanguage() === 'en'"
        (click)="toggleLanguage()"
      >
        <span [class.is-active]="currentLanguage() === 'es'">ES</span>
        <span [class.is-active]="currentLanguage() === 'en'">EN</span>
      </button>
    </div>
  </div>
</header>
