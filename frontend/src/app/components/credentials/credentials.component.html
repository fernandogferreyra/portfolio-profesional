<section class="credentials-page">
  <section class="surface-card credentials-hero" aria-labelledby="credentials-title">
    <div class="credentials-hero__copy">
      <p class="section-eyebrow">{{ ui().eyebrow }}</p>
      <h1 id="credentials-title">{{ ui().title }}</h1>
      <p>{{ ui().intro }}</p>
    </div>

    <a class="credentials-hero__link motion-control" routerLink="/" fragment="about-overview">
      {{ ui().backLabel }}
    </a>
  </section>

  <section class="credentials-grid">
    <article class="surface-card credential-card" *ngFor="let entry of entries()">
      <div class="credential-card__media" aria-hidden="true">
        <span>{{ entry.mediaLabel }}</span>
      </div>

      <div class="credential-card__copy">
        <p class="credential-card__type">{{ entry.type }}</p>
        <h2>{{ entry.title }}</h2>
        <p class="credential-card__institution">{{ entry.institution }}</p>
        <p class="credential-card__description">{{ entry.description }}</p>
      </div>
    </article>
  </section>
</section>
