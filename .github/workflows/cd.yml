name: CD

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

permissions:
  contents: read

jobs:
  build-deploy-bundle:
    name: Build Deploy Bundle
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Resolve checkout ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: portfolio-backend:${{ steps.ref.outputs.ref }}

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: portfolio-frontend:${{ steps.ref.outputs.ref }}

      - name: Validate docker compose file
        run: docker compose -f docker-compose.deploy.yml config > /tmp/docker-compose.rendered.yml

      - name: Prepare deploy bundle
        run: |
          mkdir -p deploy-bundle
          cp docker-compose.deploy.yml deploy-bundle/
          cp .env.deploy.example deploy-bundle/
          cp docs/deploy-runbook.md deploy-bundle/
          cp /tmp/docker-compose.rendered.yml deploy-bundle/docker-compose.resolved.yml
          tar -czf deploy-bundle.tar.gz deploy-bundle

      - name: Upload deploy bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-bundle
          path: deploy-bundle.tar.gz
