name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build Angular App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build:ci

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-build
          path: frontend/dist/portfolio-ferchuz/browser

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    env:
      SPRING_PROFILES_ACTIVE: dev
      PORTFOLIO_DB_URL: jdbc:postgresql://localhost:5432/portfolio_db
      PORTFOLIO_DB_USERNAME: postgres
      PORTFOLIO_DB_PASSWORD: postgres
      PORTFOLIO_TEST_DB_URL: jdbc:postgresql://localhost:5432/portfolio_db
      PORTFOLIO_TEST_DB_USERNAME: postgres
      PORTFOLIO_TEST_DB_PASSWORD: postgres
      PORTFOLIO_JWT_SECRET: ci-test-jwt-secret-key-with-minimum-length-1234567890
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: portfolio_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d portfolio_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Run backend tests
        run: ./mvnw test

      - name: Package backend
        run: ./mvnw package
