spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: ${PORTFOLIO_TEST_DB_URL:${PORTFOLIO_DB_URL:jdbc:postgresql://localhost:5432/portfolio_db}}
    username: ${PORTFOLIO_TEST_DB_USERNAME:${PORTFOLIO_DB_USERNAME:postgres}}
    password: ${PORTFOLIO_TEST_DB_PASSWORD:${PORTFOLIO_DB_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: 0
      connection-timeout: 3000
      maximum-pool-size: 2
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

logging:
  level:
    com.fernandogferreyra.portfolio.backend: INFO
