spring:
  config:
    activate:
      on-profile: test
  mail:
    host: localhost
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
  test:
    database:
      replace: none

logging:
  level:
    com.fernandogferreyra.portfolio.backend: INFO

app:
  contact:
    mail:
      enabled: false
      provider: noop
      inbox-address: ferchuz-test@portfolio.local
      from-address: no-reply@portfolio.local
      auto-reply-subject-es: Gracias por contactarte
      auto-reply-subject-en: Thanks for reaching out
      auto-reply-signature: Fernando Ferreyra
      resend-api-key:
      resend-base-url: https://api.resend.com
  document-storage:
    base-path: ${java.io.tmpdir}/portfolio-backend-test-documents
    max-file-size-bytes: 10485760
    allowed-content-types:
      - application/pdf
      - image/jpeg
      - image/png
      - image/webp
  ai:
    mistral:
      enabled: false
      url: https://api.mistral.ai/v1/chat/completions
      api-key:
      model: mistral-small-latest
      timeout-seconds: 2
  security:
    jwt:
      secret: ${PORTFOLIO_TEST_JWT_SECRET:${PORTFOLIO_JWT_SECRET:test-jwt-secret-key-with-minimum-length-1234567890}}
    bootstrap-admin:
      enabled: ${PORTFOLIO_BOOTSTRAP_ADMIN_ENABLED:true}
      username: ${PORTFOLIO_ADMIN_USERNAME:ferchuz}
      password: ${PORTFOLIO_ADMIN_PASSWORD:ferchuz-test-password}
