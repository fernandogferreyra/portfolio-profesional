spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: ${PORTFOLIO_TEST_DB_URL}
    username: ${PORTFOLIO_TEST_DB_USERNAME}
    password: ${PORTFOLIO_TEST_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: 0
      connection-timeout: 3000
      maximum-pool-size: 2
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
  test:
    database:
      replace: none

logging:
  level:
    com.fernandogferreyra.portfolio.backend: INFO
