spring:
  application:
    name: portfolio-backend
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
        boot:
          allow_jdbc_metadata_access: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    env:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

info:
  app:
    name: Portfolio Backend
    description: Backend phase 2 for Fernando Ferreyra professional portfolio
    version: 0.2.0

app:
  cors:
    allowed-origins: ${PORTFOLIO_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
  security:
    jwt:
      secret: ${PORTFOLIO_JWT_SECRET}
      issuer: ${PORTFOLIO_JWT_ISSUER:portfolio-backend}
      expiration: ${PORTFOLIO_JWT_EXPIRATION:PT8H}
    bootstrap-admin:
      enabled: ${PORTFOLIO_BOOTSTRAP_ADMIN_ENABLED:false}
      username: ${PORTFOLIO_ADMIN_USERNAME:}
      password: ${PORTFOLIO_ADMIN_PASSWORD:}

logging:
  level:
    root: INFO
    org.springframework.security: INFO
