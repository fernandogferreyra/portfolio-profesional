spring:
  application:
    name: portfolio-backend
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
        boot:
          allow_jdbc_metadata_access: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    env:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

info:
  app:
    name: Portfolio Backend
    description: Backend phase 2 for Fernando Ferreyra professional portfolio
    version: 0.2.0

app:
  cors:
    allowed-origins: ${PORTFOLIO_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
  quote:
    hourly-rate: 35.00
    saas-module-multiplier: 1.15
    complexity-multipliers:
      LOW: 1.00
      MEDIUM: 1.25
      HIGH: 1.60
    project-types:
      LANDING_PAGE:
        label: Landing page
        multiplier: 0.80
        saas: false
      CORPORATE_WEBSITE:
        label: Corporate website
        multiplier: 1.00
        saas: false
      INTERNAL_TOOL:
        label: Internal tool
        multiplier: 1.20
        saas: false
      ECOMMERCE:
        label: Ecommerce platform
        multiplier: 1.45
        saas: false
      SAAS_PLATFORM:
        label: SaaS platform
        multiplier: 1.65
        saas: true
    modules:
      DISCOVERY:
        label: Discovery and planning
        base-hours: 8.00
        saas-eligible: false
      UI_FOUNDATION:
        label: UI foundation
        base-hours: 12.00
        saas-eligible: false
      AUTHENTICATION:
        label: Authentication and roles
        base-hours: 16.00
        saas-eligible: true
      CORE_BACKEND:
        label: Core backend API
        base-hours: 22.00
        saas-eligible: true
      DASHBOARD:
        label: Admin or client dashboard
        base-hours: 20.00
        saas-eligible: true
      PAYMENTS:
        label: Payments and subscriptions
        base-hours: 18.00
        saas-eligible: true
      ANALYTICS:
        label: Analytics and tracking
        base-hours: 10.00
        saas-eligible: true
      DEVOPS:
        label: Deployment and environments
        base-hours: 14.00
        saas-eligible: true
  security:
    jwt:
      secret: ${PORTFOLIO_JWT_SECRET}
      issuer: ${PORTFOLIO_JWT_ISSUER:portfolio-backend}
      expiration: ${PORTFOLIO_JWT_EXPIRATION:PT8H}
    bootstrap-admin:
      enabled: ${PORTFOLIO_BOOTSTRAP_ADMIN_ENABLED:false}
      username: ${PORTFOLIO_ADMIN_USERNAME:}
      password: ${PORTFOLIO_ADMIN_PASSWORD:}

logging:
  level:
    root: INFO
    org.springframework.security: INFO
