spring:
  application:
    name: portfolio-backend
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
        boot:
          allow_jdbc_metadata_access: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    env:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

info:
  app:
    name: Portfolio Backend
    description: Backend phase 2 for Fernando Ferreyra professional portfolio
    version: 0.2.0

app:
  cors:
    allowed-origins: ${PORTFOLIO_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
  quote:
    hourly-rate: 35.00
    saas-module-multiplier: 1.15
    complexity-multipliers:
      LOW: 1.00
      MEDIUM: 1.25
      HIGH: 1.60
    project-types:
      LANDING_PAGE:
        label: Landing page
        multiplier: 0.80
        saas: false
      CORPORATE_WEBSITE:
        label: Corporate website
        multiplier: 1.00
        saas: false
      INTERNAL_TOOL:
        label: Internal tool
        multiplier: 1.20
        saas: false
      ECOMMERCE:
        label: Ecommerce platform
        multiplier: 1.45
        saas: false
      SAAS_PLATFORM:
        label: SaaS platform
        multiplier: 1.65
        saas: true
    modules:
      DISCOVERY:
        label: Discovery and planning
        base-hours: 8.00
        saas-eligible: false
      UI_FOUNDATION:
        label: UI foundation
        base-hours: 12.00
        saas-eligible: false
      AUTHENTICATION:
        label: Authentication and roles
        base-hours: 16.00
        saas-eligible: true
      CORE_BACKEND:
        label: Core backend API
        base-hours: 22.00
        saas-eligible: true
      DASHBOARD:
        label: Admin or client dashboard
        base-hours: 20.00
        saas-eligible: true
      PAYMENTS:
        label: Payments and subscriptions
        base-hours: 18.00
        saas-eligible: true
      ANALYTICS:
        label: Analytics and tracking
        base-hours: 10.00
        saas-eligible: true
      DEVOPS:
        label: Deployment and environments
        base-hours: 14.00
        saas-eligible: true
  budget-builder:
    configuration-id: budget-builder-seed-v1
    version: 2026-04-07-mvp
    source: seed
    currency: USD
    created-at: 2026-04-07T00:00:00Z
    working-hours-per-week: 32
    hourly-rate:
      base: 18.00
      support-hourly-rate: 8.00
      extra-hour-rate: 12.00
    commercial-multiplier: 1.00
    minimum-budget: 0.00
    rounding-rules:
      technical: ROUND_NEAREST_HOUR
      commercial: ROUND_2_DECIMALS
    module-catalog:
      - id: DISCOVERY
        category: analysis_design
        name: Discovery
        description: Discovery description
        quantity: 1
        tier: STANDARD
        base-hours: 8.00
        complexity-weight: 1.00
        module-multiplier: 1.00
        dependency-ids: []
        optional: false
      - id: CORE_BACKEND
        category: backend
        name: Core backend
        description: Core backend description
        quantity: 1
        tier: STANDARD
        base-hours: 12.00
        complexity-weight: 1.00
        module-multiplier: 1.00
        dependency-ids:
          - DISCOVERY
        optional: false
      - id: FRONTEND_APP
        category: frontend
        name: Frontend app
        description: Frontend app description
        quantity: 1
        tier: STANDARD
        base-hours: 10.00
        complexity-weight: 1.00
        module-multiplier: 1.00
        dependency-ids:
          - DISCOVERY
        optional: true
      - id: DATABASE_LAYER
        category: backend
        name: Database layer
        description: Database layer description
        quantity: 1
        tier: STANDARD
        base-hours: 8.00
        complexity-weight: 1.00
        module-multiplier: 1.00
        dependency-ids:
          - CORE_BACKEND
        optional: true
      - id: ADMIN_PANEL
        category: frontend
        name: Admin panel
        description: Admin panel description
        quantity: 1
        tier: STANDARD
        base-hours: 10.00
        complexity-weight: 1.10
        module-multiplier: 1.00
        dependency-ids:
          - CORE_BACKEND
        optional: true
    technology-catalog:
      - id: default_web_stack
        label: Default web stack
        multiplier: 1.00
        supported-project-types:
          - standard_project
      - id: outside_primary_stack
        label: Outside primary stack
        multiplier: 1.00
        surcharge-rule-id: outside-stack-surcharge
        supported-project-types:
          - standard_project
    surcharge-rules:
      - id: management-contingency-fixed
        code: management_contingency_fixed
        label: Management contingency
        reason: Covers management overhead and contingency.
        mode: FIXED
        value: 300.00
        applies-to: ONE_TIME
        stage: COMMERCIAL
        enabled-by-default: true
      - id: outside-stack-surcharge
        code: outside_stack_surcharge
        label: Outside stack surcharge
        reason: Applies when the project uses a stack outside the primary catalog.
        mode: PERCENTAGE
        value: 0.10
        applies-to: ONE_TIME
        stage: COMMERCIAL
        enabled-by-default: false
    support-rules:
      - id: support-basic
        label: Basic support
        cadence: MONTHLY
        included-hours: 3.00
        hourly-rate: 8.00
        monthly-amount: 24.00
        enabled-by-default: true
    project-type-defaults:
      - project-type: standard_project
        default-module-ids:
          - DISCOVERY
          - CORE_BACKEND
        default-surcharge-rule-ids:
          - management-contingency-fixed
        default-support-rule-id: support-basic
    project-multipliers:
      standard_project: 1.00
    stack-multipliers:
      default_web_stack: 1.00
      outside_primary_stack: 1.00
    complexity-multipliers:
      LOW: 1.00
      MEDIUM: 1.25
      HIGH: 1.60
  security:
    jwt:
      secret: ${PORTFOLIO_JWT_SECRET}
      issuer: ${PORTFOLIO_JWT_ISSUER:portfolio-backend}
      expiration: ${PORTFOLIO_JWT_EXPIRATION:PT8H}
    bootstrap-admin:
      enabled: ${PORTFOLIO_BOOTSTRAP_ADMIN_ENABLED:false}
      username: ${PORTFOLIO_ADMIN_USERNAME:}
      password: ${PORTFOLIO_ADMIN_PASSWORD:}

logging:
  level:
    root: INFO
    org.springframework.security: INFO
